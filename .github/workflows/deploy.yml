name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - publish
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    outputs:
      deployment_status: ${{ job.status }}
      deploy_url: https://resonancerehab.in
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Prepare deployment archives
        run: |
          echo "📦 Preparing deployment packages..."
          mkdir -p deploy/react
          cp -r dist/* deploy/react/
          
          if [ -f ".htaccess" ]; then
            cp .htaccess deploy/react/.htaccess
            echo "✅ .htaccess included"
          fi
          
          cd deploy
          zip -r ../react-build-${{ github.sha }}.zip react/
          cd ..
          
          echo "✅ Deployment packages ready"
          ls -lh *.zip

      - name: Deploy via FTP (Wipe & Replace)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/react/
          server-dir: /public_html/react/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: true
          log-level: verbose

      - name: Cleanup
        if: always()
        run: |
          rm -rf hostinger-deploy
          rm -rf deploy
          rm -f *.zip 2>/dev/null
          echo "✅ Cleanup complete"
