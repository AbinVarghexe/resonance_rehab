name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - publish
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    outputs:
      deployment_status: ${{ job.status }}
      deploy_url: https://resonancerehab.in
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Prepare deployment archives
        run: |
          echo "📦 Preparing deployment packages..."
          mkdir -p deploy/react
          cp -r dist/* deploy/react/
          
          if [ -f ".htaccess" ]; then
            cp .htaccess deploy/.htaccess
            echo "✅ .htaccess included"
          fi
          
          cd deploy
          zip -r ../react-build-${{ github.sha }}.zip react/
          zip -r ../htaccess-config-${{ github.sha }}.zip .htaccess
          cd ..
          
          echo "✅ Deployment packages ready"
          ls -lh *.zip

      - name: Setup SSH for Git Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger
          chmod 600 ~/.ssh/hostinger
          cat >> ~/.ssh/config << EOF
          Host resonance-git
            HostName ${{ secrets.HOSTINGER_GIT_HOST }}
            User ${{ secrets.HOSTINGER_GIT_USER }}
            IdentityFile ~/.ssh/hostinger
            StrictHostKeyChecking no
          EOF

      - name: Deploy via Git (Primary Method)
        id: git-deploy
        continue-on-error: true
        run: |
          echo "🚀 Starting Git-based deployment to Hostinger..."
          
          # Clone the Hostinger Git repository using SSH shorthand format
          git clone resonance-git${{ secrets.HOSTINGER_GIT_REPO }} hostinger-deploy || exit 1
          
          cd hostinger-deploy
          
          # Copy build files to react subdirectory
          mkdir -p react
          cp -r ../dist/* react/
          
          # Copy .htaccess to root if it exists
          if [ -f "../.htaccess" ]; then
            cp ../.htaccess .
          fi
          
          # Commit and push
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          
          git add -A
          git commit -m "Deploy: Publish branch - Build ${{ github.sha }}" || echo "No changes to commit"
          git push -u origin main || git push -u origin master || git push
          
          echo "✅ Git deployment successful"
          echo "status=success" >> $GITHUB_OUTPUT
          
          cd ..

      - name: Deploy via FTP (Fallback Method)
        if: steps.git-deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/react/
          server-dir: /public_html/react/
          state-name: .ftp-deploy-sync-state-react.json
          dangerous-clean-slate: false
          log-level: verbose

      - name: Deploy .htaccess via FTP (Fallback)
        if: steps.git-deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state-htaccess.json
          dangerous-clean-slate: false
          log-level: verbose
          exclude: |
            react/**

      - name: Cleanup
        if: always()
        run: |
          rm -rf hostinger-deploy
          rm -rf deploy
          rm -f *.zip 2>/dev/null
          echo "✅ Cleanup complete"
